services:
  # PostgreSQL для данных приложения
  db:
    image: postgres:17
    container_name: sciguide-db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sciguide}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-sciguide}
    volumes:
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - sciguide-network

  # Redis для refresh токенов и кэша
  redis:
    image: redis:7-alpine
    container_name: sciguide-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c '
      if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        exec redis-server --appendonly yes;
      fi
      '
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - sciguide-network

  # Flyway миграции
  flyway:
    image: flyway/flyway:11
    container_name: sciguide-flyway-migrator
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-sciguide}
      - DB_PORT=${DB_PORT:-5432}
    command: >
      -url=jdbc:postgresql://db:${DB_PORT:-5432}/${DB_NAME:-sciguide} -user=${DB_USER:-postgres} -password=${DB_PASSWORD:-postgres} -connectRetries=60 -baselineOnMigrate=true migrate
    volumes:
      - ./src/db/migrations:/flyway/sql:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sciguide-network

  # Backend service
  sciguide-backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: sciguide-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    networks:
      - sciguide-network
    healthcheck:
      test: [ "CMD", "python", "-c", "import http.client, os, sys; port = int(os.getenv('APP_PORT', '8000')); conn = http.client.HTTPConnection('localhost', port); conn.request('GET', '/health'); sys.exit(0 if conn.getresponse().status == 200 else 1)" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
  redis_data:

networks:
  sciguide-network:
    driver: bridge
