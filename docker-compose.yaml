services:
  # PostgreSQL для данных приложения
  db:
    image: postgres:17
    container_name: sciguide-db
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sciguide}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-sciguide}
    volumes:
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - sciguide-network

  # Redis для refresh токенов и кэша
  redis:
    image: redis:7-alpine
    container_name: sciguide-redis
    restart: unless-stopped
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    command: >
      sh -c '
      if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else
        exec redis-server --appendonly yes;
      fi
      '
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - sciguide-network

  # MinIO для хранения документов воркспейсов
  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: sciguide-minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - sciguide-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Qdrant для семантического поиска
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sciguide-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - sciguide-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Neo4j для графовой модели
  neo4j:
    image: neo4j:latest
    container_name: sciguide-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-password}
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - sciguide-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Flyway миграции
  flyway:
    image: flyway/flyway:11
    container_name: sciguide-flyway-migrator
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-sciguide}
      - DB_PORT=${DB_PORT:-5432}
    command: >
      -url=jdbc:postgresql://db:${DB_PORT:-5432}/${DB_NAME:-sciguide} -user=${DB_USER:-postgres} -password=${DB_PASSWORD:-postgres} -connectRetries=60 -baselineOnMigrate=true migrate
    volumes:
      - ./src/db/migrations:/flyway/sql:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - sciguide-network

  # Backend service
  sciguide-backend:
    build:
      context: ./src
      dockerfile: backend/Dockerfile
    container_name: sciguide-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      flyway:
        condition: service_completed_successfully
    volumes:
      - ./hf_cache:${PIPELINE_MODEL_CACHE_DIR:-/app/hf_cache}
    networks:
      - sciguide-network
    healthcheck:
      test: [ "CMD", "python", "-c", "import http.client, os, sys; port = int(os.getenv('APP_PORT', '8000')); conn = http.client.HTTPConnection('localhost', port); conn.request('GET', '/health'); sys.exit(0 if conn.getresponse().status == 200 else 1)" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Celery worker для фоновой индексации документов
  sciguide-worker:
    build:
      context: ./src
      dockerfile: backend/Dockerfile
    container_name: sciguide-worker
    restart: unless-stopped
    command: celery -A celery_app:celery_app worker --loglevel=INFO
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
      flyway:
        condition: service_completed_successfully
    volumes:
      - ./hf_cache:${PIPELINE_MODEL_CACHE_DIR:-/app/hf_cache}
    networks:
      - sciguide-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend service
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: sciguide-frontend
    restart: unless-stopped
    environment:
      - VITE_PROXY_TARGET=http://sciguide-backend:8000
    depends_on:
      sciguide-backend:
        condition: service_healthy
    expose:
      - "5173"
    networks:
      - sciguide-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:5173 > /dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx reverse proxy
  nginx:
    build:
      context: ./src/nginx
      dockerfile: Dockerfile
    container_name: sciguide-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      sciguide-backend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    networks:
      - sciguide-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
  redis_data:
  minio_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:

networks:
  sciguide-network:
    driver: bridge
