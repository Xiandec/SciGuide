services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: sciguide-notebook-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./notebooks/data/qdrant_storage:/qdrant/storage

  neo4j:
    image: neo4j:5.28
    container_name: sciguide-notebook-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./notebooks/data/neo4j_data:/data
      - ./notebooks/data/neo4j_logs:/logs
